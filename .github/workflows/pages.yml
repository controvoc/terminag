name: Build and deploy terminag site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress build finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Assemble static site into _site/
        env:
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          OUT=_site
          rm -rf "$OUT"
          mkdir -p "$OUT"

          # Data: copy folders and any top-level values_*.csv / variables_*.csv.
          for d in values variables; do
            [ -d "$d" ] && cp -r "$d" "$OUT/"
          done
          shopt -s nullglob
          for f in values_*.csv variables_*.csv; do
            cp "$f" "$OUT/"
          done
          shopt -u nullglob

          # Site files (HTML/CSS/JS) live under docs/.
          cp -r docs/. "$OUT/"
          # Don't ship the build helpers in the published artifact.
          rm -rf "$OUT/_build"

          # Disable Jekyll processing on Pages.
          touch "$OUT/.nojekyll"

          # Site config consumed by docs/assets/site.js.
          cat > "$OUT/config.js" <<EOF
          window.SITE_CONFIG = { repo: "${REPO}", branch: "${BRANCH}" };
          EOF

      - name: Generate tables manifest
        run: python3 docs/_build/manifest.py _site

      - name: Generate checker vocabulary
        run: python3 docs/_build/vocab.py _site

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
