name: Checker golden tests

on:
  push:
    branches: [main]
    paths:
      - "variables/**"
      - "values/**"
      - "values_*.csv"
      - "variables_*.csv"
      - "docs/assets/checker.js"
      - "docs/_build/fixtures/**"
      - "docs/_build/vocab.py"
      - ".github/workflows/checker.yml"
  pull_request:
    paths:
      - "variables/**"
      - "values/**"
      - "values_*.csv"
      - "variables_*.csv"
      - "docs/assets/checker.js"
      - "docs/_build/fixtures/**"
      - "docs/_build/vocab.py"
      - ".github/workflows/checker.yml"
  workflow_dispatch:

jobs:
  golden:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout terminag
        uses: actions/checkout@v4
        with:
          path: terminag

      - name: Checkout carobiner
        uses: actions/checkout@v4
        with:
          repository: carob-data/carobiner
          path: carobiner

      - name: Checkout vocal
        uses: actions/checkout@v4
        with:
          repository: controvoc/vocal
          path: vocal

      - name: Checkout yuri
        uses: actions/checkout@v4
        with:
          repository: carob-data/yuri
          path: yuri

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgdal-dev libproj-dev libgeos-dev libsqlite3-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install R packages
        run: |
          install.packages(c("remotes", "jsonlite", "rappdirs"), repos = "https://cloud.r-project.org")
          deps <- c("Depends", "Imports")
          remotes::install_local("yuri", upgrade = "never", dependencies = deps, quiet = TRUE)
          remotes::install_local("vocal", upgrade = "never", dependencies = deps, quiet = TRUE)
          # yuri and vocal are already installed from the local checkouts above, so
          # drop carobiner's GitHub "Remotes" field before installing. Otherwise
          # remotes resolves those remotes via the GitHub API, which fails with
          # HTTP 401 ("Bad credentials") as this job has no cross-org token.
          dsc <- "carobiner/DESCRIPTION"
          x <- readLines(dsc)
          i <- grep("^Remotes:", x)
          if (length(i)) {
            drop <- i
            k <- i + 1
            while (k <= length(x) && grepl("^[ \t]", x[k])) { drop <- c(drop, k); k <- k + 1 }
            writeLines(x[-drop], dsc)
          }
          remotes::install_local("carobiner", upgrade = "never", dependencies = deps, quiet = TRUE)
        shell: Rscript {0}

      - name: Build checker vocabulary
        env:
          # Use the checked-out carobiner as the source of truth for which
          # variables are required (see docs/_build/vocab.py).
          CAROBINER_REQUIRED_VARIABLES: ${{ github.workspace }}/carobiner/inst/terms/required_variables.csv
        run: |
          set -euo pipefail
          cd terminag
          OUT=_checker_site
          rm -rf "$OUT"
          mkdir -p "$OUT"
          cp -r variables values "$OUT/"
          shopt -s nullglob
          for f in values_*.csv variables_*.csv; do
            [ -f "$f" ] && cp "$f" "$OUT/"
          done
          shopt -u nullglob
          python3 docs/_build/vocab.py "$OUT"
          cp "$OUT/vocab.json" vocab.json

      - name: Run golden checker comparison
        run: python3 terminag/docs/_build/fixtures/compare_checker.py terminag/docs/_build/fixtures
