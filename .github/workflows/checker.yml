name: Checker golden tests

on:
  push:
    branches: [main]
    paths:
      - "variables/**"
      - "values/**"
      - "values_*.csv"
      - "variables_*.csv"
      - "docs/assets/checker.js"
      - "docs/_build/fixtures/**"
      - "docs/_build/vocab.py"
      - ".github/workflows/checker.yml"
  pull_request:
    paths:
      - "variables/**"
      - "values/**"
      - "values_*.csv"
      - "variables_*.csv"
      - "docs/assets/checker.js"
      - "docs/_build/fixtures/**"
      - "docs/_build/vocab.py"
      - ".github/workflows/checker.yml"
  workflow_dispatch:

jobs:
  golden:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout terminag
        uses: actions/checkout@v4
        with:
          path: terminag

      - name: Checkout carobiner
        uses: actions/checkout@v4
        with:
          repository: carob-data/carobiner
          path: carobiner

      - name: Checkout vocal
        uses: actions/checkout@v4
        with:
          repository: controvoc/vocal
          path: vocal

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install R packages
        run: |
          install.packages(c("remotes", "jsonlite", "rappdirs"), repos = "https://cloud.r-project.org")
          remotes::install_github("carob-data/yuri", upgrade = "never", quiet = TRUE)
          remotes::install_local("vocal", upgrade = "never", dependencies = TRUE, quiet = TRUE)
          remotes::install_local("carobiner", upgrade = "never", dependencies = TRUE, quiet = TRUE)
        shell: Rscript {0}

      - name: Build checker vocabulary
        run: |
          set -euo pipefail
          cd terminag
          OUT=_checker_site
          rm -rf "$OUT"
          mkdir -p "$OUT"
          cp -r variables values "$OUT/"
          shopt -s nullglob
          for f in values_*.csv variables_*.csv; do
            [ -f "$f" ] && cp "$f" "$OUT/"
          done
          shopt -u nullglob
          python3 docs/_build/vocab.py "$OUT"
          cp "$OUT/vocab.json" vocab.json

      - name: Run golden checker comparison
        run: python3 terminag/docs/_build/fixtures/compare_checker.py terminag/docs/_build/fixtures
