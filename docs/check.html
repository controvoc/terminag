<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>terminag — check your data</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="assets/site.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
</head>
<body>
<header>
	<h1><a href="./">terminag</a> <span class="sep">/</span> check</h1>
	<p class="tagline">Upload records to check variable names and values against the terminag vocabulary.</p>
</header>

<main class="check-main">
	<section>
		<h2>Upload</h2>
		<p class="section-blurb">
			Check wide-format records against the terminag vocabulary.
		</p>

		<div class="check-form">
			<label class="check-label">
				<span>Records CSV</span>
				<input type="file" id="records-file" accept=".csv,text/csv" required>
			</label>

			<div class="check-actions">
				<button type="button" id="run-check" class="btn-primary">Run check</button>
				<button type="button" id="download-report" class="btn-secondary" disabled>Download report HTML</button>
				<button type="button" id="download-results" class="btn-secondary" disabled>Download results CSV</button>
			</div>
			<p id="status" class="muted" aria-live="polite"></p>
		</div>
	</section>

	<section id="results-section" hidden>
		<h2>Report</h2>
		<p id="summary" class="section-blurb"></p>
		<div id="report-container" class="report-container"></div>
	</section>
</main>

<footer>
	<p>
		<a href="./">Vocabulary browser</a> ·
		<a href="https://carob-data.org">Carob</a> ·
		<a href="https://github.com/controvoc/vocal">vocal (R)</a>
	</p>
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script src="assets/checker.js"></script>
<script src="assets/report.js"></script>
<script>
(function () {
	"use strict";

	let vocab = null;
	let lastIssues = [];
	let lastReportOpts = null;

	const statusEl = document.getElementById("status");
	const resultsSection = document.getElementById("results-section");
	const summaryEl = document.getElementById("summary");
	const reportContainer = document.getElementById("report-container");
	const downloadBtn = document.getElementById("download-results");
	const downloadReportBtn = document.getElementById("download-report");

	function setStatus(msg, isError) {
		statusEl.textContent = msg;
		statusEl.className = isError ? "error" : "muted";
	}

	async function loadVocab() {
		const r = await fetch("vocab.json", { cache: "no-cache" });
		if (!r.ok) throw new Error("cannot load vocab.json (HTTP " + r.status + ")");
		vocab = await r.json();
	}

	function readFile(file) {
		return new Promise((resolve, reject) => {
			const reader = new FileReader();
			reader.onload = () => resolve(reader.result);
			reader.onerror = () => reject(reader.error);
			reader.readAsText(file);
		});
	}

	function showResults(issues, records, metadata) {
		lastIssues = issues;
		lastReportOpts = { records, metadata, issues, vocab };
		if (issues.length === 0) {
			summaryEl.textContent = "No vocabulary issues found.";
		} else {
			summaryEl.textContent = `${issues.length} issue(s) found.`;
		}
		const oldMap = reportContainer.querySelector("#carob-report-map");
		if (oldMap) CarobReport.destroyMap(oldMap);
		reportContainer.innerHTML = CarobReport.buildReport(lastReportOpts);
		const mapEl = reportContainer.querySelector("#carob-report-map");
		if (mapEl) {
			requestAnimationFrame(() => CarobReport.initMap(mapEl, records));
		}
		resultsSection.hidden = false;
		downloadBtn.disabled = issues.length === 0;
		downloadReportBtn.disabled = false;
	}

	document.getElementById("run-check").addEventListener("click", async () => {
		const recFile = document.getElementById("records-file").files[0];
		if (!recFile) {
			setStatus("Choose a records CSV file.", true);
			return;
		}
		try {
			setStatus("Loading vocabulary…");
			if (!vocab) await loadVocab();
			setStatus("Reading file…");
			const recText = await readFile(recFile);
			const records = CarobCheck.parseCSV(recText);
			if (records.rows.length === 0) {
				setStatus("Records CSV has no data rows.", true);
				return;
			}
			const issues = CarobCheck.checkTerms({
				vocab,
				records,
				check: "nogeo",
			});
			showResults(issues, records, null);
			setStatus(`Checked ${records.rows.length} record(s).`);
		} catch (e) {
			setStatus(e.message || String(e), true);
		}
	});

	downloadBtn.addEventListener("click", () => {
		const lines = ["check,msg"];
		for (const row of lastIssues) {
			const c = `"${String(row.check).replace(/"/g, '""')}"`;
			const m = `"${String(row.msg).replace(/"/g, '""')}"`;
			lines.push(`${c},${m}`);
		}
		const blob = new Blob([lines.join("\n") + "\n"], { type: "text/csv" });
		const a = document.createElement("a");
		a.href = URL.createObjectURL(blob);
		a.download = "carob-check-results.csv";
		a.click();
		URL.revokeObjectURL(a.href);
	});

	downloadReportBtn.addEventListener("click", () => {
		if (!lastReportOpts) return;
		const html = CarobReport.buildReportDocument(lastReportOpts);
		const blob = new Blob([html], { type: "text/html;charset=utf-8" });
		const a = document.createElement("a");
		a.href = URL.createObjectURL(blob);
		a.download = "carob-report.html";
		a.click();
		URL.revokeObjectURL(a.href);
	});

	loadVocab().catch(e => setStatus(e.message, true));
})();
</script>
</body>
</html>
